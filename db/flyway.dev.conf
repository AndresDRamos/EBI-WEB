# Flyway configuration — DEVELOPMENT (EBI_dev)
# Apply with: flyway -configFiles=db/flyway.dev.conf migrate
# The password is NOT stored here. Provide it via the FLYWAY_PASSWORD environment
# variable (set EBI_MIGRATOR_PASSWORD in .env and export it as FLYWAY_PASSWORD),
# or in db/flyway.dev.conf.local (gitignored).

flyway.url=jdbc:sqlserver://servereps.database.windows.net:1433;databaseName=EBI_dev;encrypt=true;trustServerCertificate=false;loginTimeout=30
flyway.user=ebi_migrator
flyway.locations=filesystem:db/migrations
flyway.defaultSchema=dbo
flyway.cleanDisabled=true
