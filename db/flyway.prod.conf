# Flyway configuration — PRODUCTION (EBI)
# Apply ONLY through the gated CI/CD job, never ad-hoc against prod.
# Password via FLYWAY_PASSWORD (from Key Vault / CI secret). Never store it here.

flyway.url=jdbc:sqlserver://servereps.database.windows.net:1433;databaseName=EBI;encrypt=true;trustServerCertificate=false;loginTimeout=30
flyway.user=ebi_migrator
flyway.locations=filesystem:db/migrations
flyway.defaultSchema=dbo
flyway.cleanDisabled=true
